name: "Entertainment & Life"

on:
  schedule:
    # 23:10 UTC = 07:10 CST (Next Day) -> Damai
    - cron: '10 23 * * *'
    # 05:00 UTC = 13:00 CST -> Game
    - cron: '0 5 * * *'
    # 11:30 UTC = 19:30 CST -> Paper
    - cron: '30 11 * * *'
    # 12:00 UTC = 20:00 CST -> Life (Movie)
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-entertainment:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-noto-cjk
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run Modules
      env:
        RUN_MODE: cloud
        # Tokens
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        SMMS_TOKEN: ${{ secrets.SMMS_TOKEN }}
        # Cloudflare D1
        CLOUDFLARE_D1_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_D1_ACCOUNT_ID }}
        CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        CLOUDFLARE_D1_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
        # Cloudflare R2
        CLOUDFLARE_AccountId: ${{ secrets.CLOUDFLARE_D1_ACCOUNT_ID }}
        CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
        CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
        CLOUDFLARE_R2_DOMAIN: ${{ secrets.CLOUDFLARE_R2_DOMAIN }}
        
      run: |
        # Get Current Hour in UTC
        HOUR=$(date -u +%H)
        echo "Current UTC Hour: $HOUR"
        
        # Check if manually triggered
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual Trigger Detected. Running ALL modules..."
            python main.py run damai --topic baobao
            python main.py run game --topic stock
            python main.py run life --topic baobao
            exit 0
        fi
        
        # Scheduled Logic
        if [ "$HOUR" -eq "23" ]; then
            echo "Running Damai..."
            python main.py run damai --topic baobao

        elif [ "$HOUR" -eq "05" ]; then
            echo "Running Game Schedule..."
            python main.py run game --topic stock
            
        elif [ "$HOUR" -eq "12" ]; then
            echo "Running Life (Movie/Show)..."
            python main.py run life --topic baobao

        elif [ "$HOUR" -eq "11" ]; then
            echo "Running Paper (Research)..."
            python main.py run paper --topic paper
            
        else
            echo "Unknown schedule for hour $HOUR"
        fi
