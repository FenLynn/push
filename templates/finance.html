<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>财经日报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{width:100%;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:transparent;width:100%;overflow-x:hidden;font-size:13px;color:#1f2937}
.container{width:100%;padding:8px;max-width:600px;margin:0 auto}
.hd{background:rgba(255,255,255,0.9);border:1px solid #e5e7eb;padding:10px;text-align:center;font-weight:700;border-radius:6px;margin-bottom:10px;font-size:15px;color:#111827}
.sec{margin-bottom:14px}
.st{background:rgba(59,130,246,0.08);border-left:3px solid #3b82f6;padding:6px 10px;font-size:12px;font-weight:600;margin-bottom:6px;color:#1e40af}
.card{margin-bottom:8px;background:rgba(255,255,255,0.95);border:1px solid #e5e7eb;padding:6px;border-radius:6px;transition:box-shadow .2s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.n{font-size:11px;font-weight:600;color:#374151;margin-bottom:3px}
.d{font-size:10px;color:#9ca3af;text-align:right;margin-top:3px}
img{width:100%;display:block;border-radius:4px;background:#f9fafb}
@media(prefers-color-scheme:dark){
body{background:transparent;color:#e5e7eb}
.hd{background:rgba(31,41,55,0.95);border-color:#374151;color:#f3f4f6}
.st{background:rgba(59,130,246,0.15);border-left-color:#60a5fa;color:#93c5fd}
.card{background:rgba(31,41,55,0.9);border-color:#374151}
.n{color:#e5e7eb}
.d{color:#6b7280}
img{background:#1f2937}
}
</style>
</head>
<body>
<div class="container">
<div class="hd">📊 宏观经济日报 · {{today}}</div>
{%- if updated -%}
<div class="sec">
<div class="st">✅ 今日更新 ({{updated|length}})</div>
{%- for i in updated -%}
<div class="card">
<div class="n">{{i.display_name or i.name}}</div>
<img src="{{i.url}}" alt="{{i.name}}" loading="lazy">
<div class="d">{{i.date}}</div>
</div>
{%- endfor -%}
</div>
{%- endif -%}
{%- if cached -%}
<div class="sec">
<div class="st">📁 缓存数据 ({{cached|length}})</div>
{%- for i in cached -%}
<div class="card">
<div class="n">{{i.display_name or i.name}}</div>
<img src="{{i.url}}" alt="{{i.name}}" loading="lazy">
<div class="d">{{i.date}}</div>
</div>
{%- endfor -%}
</div>
{%- endif -%}
</div>
</body>
</html>
