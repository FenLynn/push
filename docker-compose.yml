version: '3.8'

services:
   # 1. Push Service (Python + Cron)
  push-service:
    build: .
    image: push-service:latest
    container_name: push-service
    restart: always
    volumes:
      - .:/app
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - PUSHPLUS_TOKEN=${PUSHPLUS_TOKEN}
      - TTRSS_USER=${TTRSS_USER}
      - TTRSS_PASSWORD=${TTRSS_PASSWORD}
      - TTRSS_URL=http://ttrss-web:80
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - ttrss-web
      - mercury

  # 2. Database (Postgres for TTRSS)
  db:
    image: postgres:13-alpine
    container_name: postgres-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data

  # 3. TTRSS App (PHP-FPM)
  ttrss:
    image: cthulhoo/ttrss-fpm-pgsql-static:latest
    container_name: ttrss-app
    restart: always
    environment:
      - DB_TYPE=pgsql
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - SELF_URL_PATH=${SELF_URL_PATH}
    volumes:
      - ttrss_data:/var/www/html
    depends_on:
      - db

  # 4. TTRSS Web (Nginx) - LOCALHOST ONLY for security
  ttrss-web:
    image: nginx:alpine
    container_name: ttrss-web
    restart: always
    ports:
      # 🔒 仅绑定到本机，公网无法直接访问
      - "127.0.0.1:18100:80"
    volumes:
      - ttrss_data:/var/www/html:ro
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - ttrss

  # 5. Mercury Parser (Full Text)
  mercury:
    image: wangqiru/mercury-parser-api:latest
    container_name: mercury-parser
    restart: always
    expose:
      - "3000"

volumes:
  db_data:
  ttrss_data:
