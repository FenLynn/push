<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ title }}</title>
    <style>
        :root {
            /* Morning Style Variables */
            --bg: #ffffff;
            --card: #ffffff;
            --text: #333333;
            --muted: #666666;
            --border: #f0f0f0;
            --accent: #FF5A5F; /* Damai Pink */
            --price: #FF5A5F;
            --tag-bg: #FFF0F5;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card: #000000;
                --text: #f1f5f9;
                --muted: #94a3b8;
                --border: #333333;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            line-height: 1.4;
            padding: 8px;
        }

        .container {
            max-width: 600px; /* Aligned with Morning */
            margin: 0 auto;
            width: 100%;
        }

        /* Morning Style Header */
        .header {
            text-align: center;
            padding: 10px 0;
            margin-bottom: 5px;
        }
        
        .header-title {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #FF9A9E, #FECFEF); /* Damai Gradient */
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        
        .header-sub {
            font-size: 13px;
            color: var(--muted);
        }

        /* Stats Bar (Simple Text) */
        .stats {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--muted);
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border);
        }

        /* Event List (Flat) */
        .event-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
        }
        
        .event-item:last-child {
            border-bottom: none;
        }

        .poster {
            width: 80px;
            height: 106px;
            border-radius: 6px;
            background-color: #f0f0f0;
            object-fit: cover;
            flex-shrink: 0;
        }

        .info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 6px;
            color: var(--text);
            /* Line Clamp */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .details {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }

        .price {
            color: var(--price);
            font-size: 16px;
            font-weight: 700;
            white-space: nowrap; /* Prevent wrapping */
            flex-shrink: 0;      /* Do not shrink */
        }
        
        .price span {
            font-size: 12px;
            font-weight: 400;
            margin-right: 1px;
        }
        
        .venue-tag {
            font-size: 12px;
            color: var(--muted);
            background: rgba(0,0,0,0.03);
            padding: 2px 6px;
            border-radius: 4px;
            /* Truncation Logic */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px; /* Limit width to ensure price has space */
            text-align: right;
        }
        @media (prefers-color-scheme: dark) {
             .venue-tag { background: rgba(255,255,255,0.1); }
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Morning Style Header -->
        <div class="header">
            <div class="header-title">🎫 {{ city }}演出票务</div>
            <div class="header-sub">{{ date.split(' ')[0] }} · 共 {{ events|length }} 场演出</div>
        </div>

        <!-- List -->
        <div class="event-list">
            {% for event in events %}
            <a href="{{ event.link }}" class="event-item">
                <img src="{{ event.img }}" class="poster" loading="lazy" onerror="this.src='https://via.placeholder.com/80x106?text=No+Img'">
                <div class="info">
                    <div class="title">{{ event.title }}</div>
                    <div class="details">
                        <div>📅 {{ event.time }}</div>
                    </div>
                    <div class="footer-row">
                        <div class="price"><span>¥</span>{{ event.price }}</div>
                        <div class="venue-tag">{{ event.venue }}</div>
                    </div>
                </div>
            </a>
            {% endfor %}
        </div>

        {% if not events %}
        <div style="text-align:center;padding:40px;color:var(--muted)">暂无最新演出信息</div>
        {% endif %}

        <div class="footer"> 数据来源: 秀动网 (ShowStart) </div>
    </div>
</body>
</html>
