name: "Stock Market Updates"

on:
  schedule:
    # 03:35 UTC = 11:35 CST (Morning Close)
    - cron: '35 3 * * 1-5'
    # 07:05 UTC = 15:05 CST (Daily Close)
    - cron: '5 7 * * 1-5'
  workflow_dispatch:

jobs:
  run-market:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run Stock & ETF Modules
      env:
        RUN_MODE: cloud
        # Tokens
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        SMMS_TOKEN: ${{ secrets.SMMS_TOKEN }}
        # Cloudflare D1
        CLOUDFLARE_D1_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_D1_ACCOUNT_ID }}
        CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        CLOUDFLARE_D1_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
        # Cloudflare R2
        CLOUDFLARE_AccountId: ${{ secrets.CLOUDFLARE_D1_ACCOUNT_ID }}
        CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
        CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
        CLOUDFLARE_R2_DOMAIN: ${{ secrets.CLOUDFLARE_R2_DOMAIN }}
        
      run: |
        # Run both stock and etf modules, sending to 'stock' topic
        python main.py run stock etf --topic stock
