name: "Daily Finance Report"

on:
  schedule:
    # 12:00 UTC = 20:00 CST -> Estate (Chengdu)
    - cron: '0 12 * * *'
    # 12:30 UTC = 20:30 CST -> Finance/Fund
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-noto-cjk

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run Finance Module
      env:
        RUN_MODE: cloud
        # Tokens
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        SMMS_TOKEN: ${{ secrets.SMMS_TOKEN }}
        # Cloudflare D1
        CLOUDFLARE_D1_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_D1_ACCOUNT_ID }}
        CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        CLOUDFLARE_D1_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
        # Cloudflare R2
        CLOUDFLARE_AccountId: ${{ secrets.CLOUDFLARE_D1_ACCOUNT_ID }}
        CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
        CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
        CLOUDFLARE_R2_DOMAIN: ${{ secrets.CLOUDFLARE_R2_DOMAIN }}
        # LLM (Finance uses LLM for analysis)
        LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        LLM_MODEL: ${{ secrets.LLM_MODEL }}
        
      run: |
        # Get Current UTC time (HHMM)
        TIME=$(date -u +%H%M)
        echo "Current UTC Time: $TIME"

        # Manual Trigger
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual Trigger: Running Estate, Paper, Finance, and Fund..."
            python main.py run estate --topic family
            python main.py run paper --topic paper
            python main.py run finance
            python main.py run fund --topic stock
            exit 0
        fi

        # Scheduled Logic
        if [ "$TIME" == "1200" ]; then
            echo "Running Estate and Paper..."
            python main.py run estate --topic family
            python main.py run paper --topic paper
        elif [ "$TIME" == "1230" ]; then
            echo "Running Finance and Fund..."
            python main.py run finance
            python main.py run fund --topic stock
        else
            echo "No module scheduled for time $TIME"
            # Fallback for small GHA delays
            if [[ "$TIME" > "1230" && "$TIME" < "1235" ]]; then
                 python main.py run finance
                 python main.py run fund --topic stock
            fi
        fi
