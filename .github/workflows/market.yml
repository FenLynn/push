name: "Stock Market Updates"

on:
  schedule:
    # 03:35 UTC = 11:35 CST (Market AM Close)
    - cron: '35 3 * * 1-5'
    # 07:05 UTC = 15:05 CST (Market PM Close)
    - cron: '5 7 * * 1-5'
    # 22:00 UTC = 06:00 CST (Next Day - US Stock Close)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  run-market:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-noto-cjk
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run Market Modules
      env:
        RUN_MODE: cloud
        # Tokens
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        SMMS_TOKEN: ${{ secrets.SMMS_TOKEN }}
        # Cloudflare D1
        CLOUDFLARE_D1_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_D1_ACCOUNT_ID }}
        CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        CLOUDFLARE_D1_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
        # Cloudflare R2
        CLOUDFLARE_AccountId: ${{ secrets.CLOUDFLARE_D1_ACCOUNT_ID }}
        CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
        CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
        CLOUDFLARE_R2_DOMAIN: ${{ secrets.CLOUDFLARE_R2_DOMAIN }}
        
      run: |
        # Get Current Hour in UTC
        HOUR=$(date -u +%H)
        echo "Current UTC Hour: $HOUR"
        
        # Check if manually triggered
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual Trigger Detected. Running ALL modules..."
            python main.py run stock etf --topic stock
            python main.py run night --topic stock
            exit 0
        fi
        
        if [ "$HOUR" -eq "22" ]; then
            # 22:00 UTC = 06:00 CST -> US Night Report
            echo "Running Night Report..."
            python main.py run night --topic stock
        else
            # 03:35 / 07:05 UTC -> A-Share Market
            echo "Running Stock/ETF Report..."
            python main.py run stock etf --topic stock
        fi
