<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早报</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --subtext: #6b7280;
            --border: #e5e7eb;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            font-size: 14px;
            line-height: 1.4;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
        }
        
        /* Compact Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0 4px 8px;
        }
        .header h1 {
            font-size: 18px;
            margin: 0;
            color: var(--primary);
            font-weight: 800;
        }
        .header .meta {
            font-size: 12px;
            color: var(--subtext);
        }

        /* Dashboard Grid */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        /* Card Styles */
        .card {
            background: var(--card);
            border-radius: 8px;
            padding: 10px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .card-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .card-row:last-child { margin-bottom: 0; }
        
        .c-label { font-size: 12px; color: var(--subtext); }
        .c-val { font-weight: 600; font-size: 14px; }
        
        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--subtext);
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        /* Holiday Compact */
        .holiday-row {
            display: flex;
            justify-content: space-between;
            background: #fff1f2;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 4px;
            font-size: 12px;
            color: #be123c;
        }

        /* Weather Compact */
        .weather-pill {
            display: inline-flex;
            align-items: center;
            background: #f0f9ff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            color: #0369a1;
            margin-right: 4px;
            border: 1px solid #bae6fd;
        }

        /* Finance Compact */
        .market-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 2px 0;
            border-bottom: 1px dashed var(--border);
        }
        .market-item:last-child { border: none; }
        .up { color: #dc2626; }
        .down { color: #16a34a; }

        /* Images */
        .img-card {
            border-radius: 8px;
            overflow: hidden;
            margin-top: 8px;
            border: 1px solid var(--border);
        }
        .img-card img { width: 100%; display: block; }
        .img-caption {
            padding: 4px 8px;
            font-size: 11px;
            background: #fff;
            color: var(--subtext);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 1. Header -->
        <div class="header">
            <h1>晚上好早报</h1>
            <div class="meta">2026-02-03 星期二</div>
        </div>

        <!-- 2. Top Row: Info + Weather -->
        <div class="card" style="margin-bottom: 8px;">
            <div class="card-row">
                <span class="c-label">腊月十六 (蛇年)</span>
                <span class="badge" style="background:#dbeafe; color:#1e40af; padding:1px 6px; border-radius:4px; font-size:11px;">
                    工作日 (W6)
                </span>
            </div>
                <div class="holiday-row">
                    <span>情人节 <b style="font-size:13px">11</b>天</span>
                    <span>春节 <b style="font-size:13px">14</b>天</span>
                </div>
            
            <div style="margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px;">
                <span class="weather-pill">
                    <b>双流</b>&nbsp;7/13°C
                </span>
                <span class="weather-pill">
                    <b>西安</b>&nbsp;2/12°C
                </span>
                <span class="weather-pill">
                    <b>延安</b>&nbsp;-4/10°C
                </span>
                <span class="weather-pill">
                    <b>宜都</b>&nbsp;2/15°C
                </span>
            </div>
        </div>

        <!-- 3. Market & Finance Grid -->
        <div class="grid-2">
            <!-- Market -->
            <div class="card">
                <div class="section-title">📉 市场夜盘</div>
                <div class="market-item">
                    <span>A50</span>
                    <span class="up">0.09%</span>
                </div>
                <div class="market-item">
                    <span>纳指</span>
                    <span class="down">-1.1%</span>
                </div>
                <div class="market-item">
                    <span>标普</span>
                    <span class="down">-0.58%</span>
                </div>
            </div>

            <!-- Value -->
            <div class="card">
                <div class="section-title">💰 金价汇率</div>
                <div class="market-item">
                    <span>国内金</span>
                    <span>1089.9</span>
                </div>
                <div class="market-item">
                    <span>国际金</span>
                    <span>4881.3</span>
                </div>
            </div>
        </div>

        <!-- 4. Quota (Compact) -->
        <div class="card" style="margin-bottom: 8px; padding: 8px 10px;">
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;">
                <span style="color:var(--subtext)">流量 5.76G / 500.0G</span>
                <span>1.15% (余 28 天)</span>
            </div>
            <div style="height:4px; background:#e5e7eb; border-radius:2px; overflow:hidden;">
                <div style="height:100%; width:1.15%; background:linear-gradient(to right, #4f46e5, #ec4899);"></div>
            </div>
        </div>

        <!-- 5. Quote -->
        <div class="card" style="background:#f9fafb; border:none; font-style:italic; color:#4b5563; padding: 8px; margin-bottom:8px;">
            “The answer is in the wind, but you must catch it with your own hands. 答案在风中，但你必须亲手捕捉。”
        </div>

        <!-- 6. Images (Stacked) -->

    </div>
</body>
</html>
