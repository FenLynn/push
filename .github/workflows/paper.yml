name: "Module: Paper Push"

on:
  schedule:
    # 12:00 UTC = 20:00 CST
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '推送模式 (production=发paper群, test=只发自己)'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - test

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Paper
        env:
          TZ: Asia/Shanghai
          RUN_MODE: cloud
          PAPER_SOURCE_MODE: d1
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SMMS_TOKEN: ${{ secrets.SMMS_TOKEN }}
          # LLM for summaries
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          # Storage
          CLOUDFLARE_D1_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_D1_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_D1_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
          CLOUDFLARE_AccountId: ${{ secrets.CLOUDFLARE_D1_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
          CLOUDFLARE_R2_DOMAIN: ${{ secrets.CLOUDFLARE_R2_DOMAIN }}
        # 定时运行(无 inputs) 或 production 模式 → paper 群组
        # 手动选 test 模式 → 只发给自己 (--topic me)
        run: |
          if [ "${{ github.event.inputs.mode }}" = "test" ]; then
            echo "🧪 Test 模式：仅发送给自己 (--topic me)"
            python main.py run paper --topic me
          else
            echo "📢 Production 模式：发送到 paper 群组 (--topic paper)"
            python main.py run paper --topic paper
          fi
