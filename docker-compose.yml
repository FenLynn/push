version: '3.8'

networks:
  push-network:
    driver: bridge

services:
  # 1. Push Service (Python Application)
  push-service:
    image: ghcr.io/fenlynn/push:main
    container_name: push-service
    restart: always
    networks:
      - push-network
    volumes:
      # --- 代码挂载 (用于开发与热更新) ---
      - ./core:/app/core
      - ./sources:/app/sources
      - ./config:/app/config  # 这里的配置映射到容器内
      - ./cloud:/app/cloud
      - ./channels:/app/channels
      - ./templates:/app/templates
      - ./main.py:/app/main.py
      
      # --- 数据持久化挂载 ---
      - ./.private:/app/.private # 存放私密配置/密钥
      - ./output:/app/output      # 存放生成的 HTML 报告
      - ./logs:/app/logs          # 存放运行日志
      - ./data:/app/data          # 存放 SQLite 数据库 (任务记录/D1缓存)
    env_file:
      - .env
    environment:
      # 显式注入关键 Token (作为环境变量的备选方案)
      - PUSHPLUS_TOKEN=${PUSHPLUS_TOKEN:-bb703a31058442b3a61489b82eaf1d63}
      - SMMS_TOKEN=${SMMS_TOKEN:-6269a699-a12a-bfb5-56d3-998806293288}
      - SEE_TOKEN=${SEE_TOKEN:-6269a699-a12a-bfb5-56d3-998806293288}
    entrypoint: ["/app/scripts/docker_entrypoint.sh"]
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    # --- 容器标签 (Ofelia 定时任务配置) ---
    labels:
      ofelia.enabled: "true"
      
      # [1] 基础每日任务 (Daily Modules)
      # 早上 7:00 推送个人日报 (天气/财金/英语) 到默认通道
      ofelia.job-exec.morning.schedule: "0 00 7 * * *"
      ofelia.job-exec.morning.command: "python main.py run morning"
      
      # 晚上 19:30 推送论文、科研研报到 paper 频道
      ofelia.job-exec.paper.schedule: "0 30 19 * * *"
      ofelia.job-exec.paper.command: "python main.py run paper --topic paper"
      
      # 晚上 20:00 推送当日影视数据到 baobao 频道
      ofelia.job-exec.life.schedule: "0 00 20 * * *"
      ofelia.job-exec.life.command: "python main.py run life --topic baobao"
      
      # 早上 7:10 检查大麦网演出信息到 baobao 频道
      ofelia.job-exec.damai.schedule: "0 10 7 * * *"
      ofelia.job-exec.damai.command: "python main.py run damai --topic baobao"
      
      # 中午 13:00 午间休息查看游戏赛程到 stock 频道
      ofelia.job-exec.game.schedule: "0 00 13 * * *"
      ofelia.job-exec.game.command: "python main.py run game --topic stock"

      # [2] 金融交易任务 (Market Focused)
      # --- 早盘收盘后 (11:35) ---
      # A股早盘总结
      ofelia.job-exec.stock_am.schedule: "0 35 11 * * *"
      ofelia.job-exec.stock_am.command: "python main.py run stock --topic stock"
      
      # ETF/指数量能监控
      ofelia.job-exec.etf_am.schedule: "0 35 11 * * *"
      ofelia.job-exec.etf_am.command: "python main.py run etf --topic stock"
      
      # --- 全天收盘后 (15:05) ---
      # A股全天行情分析
      ofelia.job-exec.stock_pm.schedule: "0 05 15 * * *"
      ofelia.job-exec.stock_pm.command: "python main.py run stock --topic stock"
      
      # ETF/指数全天量能监控
      ofelia.job-exec.etf_pm.schedule: "0 05 15 * * *"
      ofelia.job-exec.etf_pm.command: "python main.py run etf --topic stock"
      
      # --- 晚间总结 (20:30) ---
      # 基金净值与估值更新
      ofelia.job-exec.fund.schedule: "0 30 20 * * *"
      ofelia.job-exec.fund.command: "python main.py run fund --topic stock"
      
      # 财经日报/宏观消息汇总
      ofelia.job-exec.finance.schedule: "0 30 20 * * *"
      ofelia.job-exec.finance.command: "python main.py run finance"
      
      # --- 美股交易次日 (06:00) ---
      # 美股隔夜收盘报告
      ofelia.job-exec.night.schedule: "0 00 6 * * *"
      ofelia.job-exec.night.command: "python main.py run night --topic stock"

  # 2. Ofelia Scheduler
  ofelia:
    image: mcuadros/ofelia:latest
    container_name: push-ofelia
    depends_on:
      - push-service
    command: daemon --docker
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always


